spring.application.name=FosterLinkBackend
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=jdbc:mysql://${DB_HOSTNAME}:${DB_PORT}/${DB_DATABASE}?useSSL=${DB_USE_SSL}
spring.datasource.username=${SPRING_USERNAME}
spring.datasource.password=${SPRING_PASSWORD}

server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false

# Access token lifetime: 15 minutes
app.jwtExpirationInMs=900000
app.jwtSecret=${JWT_SECRET}

# Refresh token lifetime: 7 days (session), 365 days (stay logged in)
app.refreshTokenExpirationMs=604800000
app.refreshTokenExpirationLongMs=31536000000
app.tokenAuthExpirationPeriodMs=86400000
app.frontendUrl=${FRONTEND_URL}

# Pepper used for HMAC-SHA256 hashing of emails on account deletion (for GDPR compliance)
app.emailHashPepper=${EMAIL_HASH_PEPPER}

management.endpoints.web.exposure.include=prometheus,health
management.endpoint.health.show-details=when_authorized

management.metrics.tags.application=fosterlink_backend_${MODE:development}

# Serialize dates as ISO strings (not epoch ms) in UTC timezone so clients can parse them unambiguously
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

google.maps.api.key=${MAPS_API_KEY}

# Mail (for registration thank-you and other transactional email)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Optional: set to false to disable sending registration thank-you emails (e.g. in dev)
# app.mail.registration.enabled=true

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
